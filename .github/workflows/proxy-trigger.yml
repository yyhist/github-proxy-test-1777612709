name: Proxy Trigger Test
on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message from proxy'
        required: true
        default: 'Hello'
      payload:
        description: 'JSON payload'
        required: false
        default: '{}'
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Received message ${{ github.event.inputs.message }}"
      - run: echo "Payload ${{ github.event.inputs.payload }}"
